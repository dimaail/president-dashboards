  }, []);

  const pickRegionFromOverview = (id) => { setActiveRegion(id); setTab("pdm"); };

  const tabBody = {
    overview: <TabOverview t={t} data={data} activeRegion={activeRegion} setActiveRegion={pickRegionFromOverview} />,
    switch:   <TabSwitch   t={t} data={data} />,
    bou:      <TabBoU      t={t} data={data} />,
    fia:      <TabFIA      t={t} data={data} />,
    ura:      <TabURA      t={t} data={data} />,
    pdm:      <TabPDM      t={t} data={data} activeRegion={activeRegion} setActiveRegion={setActiveRegion} />,
    news:     <TabNews     t={t} />,
    govmail:  <TabGovMail  t={t} />,
  };

  const clock      = now.toLocaleTimeString("en-GB", { hour12: false });
  const todayLabel = now.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
  const periodEnd  = now.toLocaleDateString("en-GB", { day: "2-digit", month: "2-digit", year: "2-digit" }).replace(/\//g, ".");

  const ddMessages = messages.filter(m => m.tab === ddTab)
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
    .slice(0, 3);

  const mailCtxValue = { messages, setMessages, selectedId, setSelectedId, ddOpen, setDdOpen, ddTab, setDdTab };

  return (
    <window.MailCtx.Provider value={mailCtxValue}>
    <window.NavCtx.Provider value={{ setTab }}>
    <window.LangCtx.Provider value={t}>
    <div className={`pres density-${tweaks.density === "comfortable" ? "comfortable" : "compact"}${tab === "govmail" ? " govmail-active" : ""}`}
         data-screen-label={`01 ${tab.toUpperCase()}`}>

      {/* ── Brand ────────────────────────────────────────────────── */}
      <div className="pres-brand">
        <img className="pres-brand-mark" src="../assets/Coat_of_arms_of_Uganda.svg.png" alt="Coat of Arms of Uganda" />
        <div>
          <div className="pres-brand-title">SWITCH</div>
          <div className="pres-brand-sub">{t("Office of the President")}</div>
        </div>
      </div>

      {/* ── Topbar ───────────────────────────────────────────────── */}
      <div className="pres-topbar">
        <div className="pres-tabs">
          {TABS.map(tb => (
            <button key={tb.id}
              className={`pres-tab ${tab === tb.id ? "is-active" : ""}`}
              onClick={() => setTab(tb.id)}>
              <span className="dot" />
              {t(tb.label)}
              {tb.id === "fia" && alertCounts["fia"] ? <span className="tab-badge">{alertCounts["fia"]}</span> : null}
            </button>
          ))}
        </div>
        <div className="pres-topbar-meta">
          <span>{t("Period")}: {periodEnd}</span>
          <span className="muted">·</span>
          <span className="muted">{data.fxRate}</span>
          <span className="clock">{clock} EAT</span>
          <span className="lang-toggle">
            <button className={tweaks.language === "en" ? "is-active" : ""} onClick={() => setTweak("language", "en")}>EN</button>
            <button className={tweaks.language === "lg" ? "is-active" : ""} onClick={() => setTweak("language", "lg")}>Luganda</button>
          </span>

          {/* ── Mail icon + dropdown ── */}
          <span className="mail-dropdown-wrap" ref={ddRef}>
            <button className="mail-icon-btn" title="Gov Mail" onClick={() => setDdOpen(o => !o)}>
              <Icon name="mail" size={20} />
              {unreadCount > 0 && <span className="mail-badge">{unreadCount}</span>}
            </button>
            {ddOpen && (
              <div className="mail-dropdown">
                <div className="mail-dd-head">
                  State Mail
                  <button className="mail-dd-close" onClick={() => setDdOpen(false)}>
                    <Icon name="close" size={18} />
                  </button>
                </div>
                <div className="mail-dd-tabs">
                  {["inbox", "outbox"].map(id => (
                    <button key={id}
                      className={`mail-dd-tab ${ddTab === id ? "is-active" : ""}`}
                      onClick={() => setDdTab(id)}>
                      {id === "inbox" ? `Inbox${unreadCount > 0 ? ` (${unreadCount})` : ""}` : "Outbox"}
                    </button>
                  ))}
                </div>
                <div className="mail-dd-list">
                  {ddMessages.length === 0
                    ? <div style={{ padding: "16px", color: "var(--pres-text-mute)", fontSize: 12, fontStyle: "italic" }}>No messages</div>
                    : ddMessages.map(m => (
                      <div key={m.id}
                        className={`mail-dd-row ${m.status !== "read" ? "is-unread" : ""}`}
                        onClick={() => openFromDropdown(m.id)}>
                        <div className="mail-dd-row-top">
                          <span className="mail-dd-org">{m.sender_org}</span>
                          <span className="mail-dd-subject">
                            {m.subject.length > 45 ? m.subject.slice(0, 45) + "…" : m.subject}
                          </span>
                        </div>
                        <div className="mail-dd-row-bot">
                          <span>{formatMailTime(m.timestamp)}</span>
                          {m.status !== "read" && (
                            <span className={`mail-dd-status s-${m.status}`}>
                              {m.status === "urgent" ? "⚠ Urgent" : m.status === "action_required" ? "! Action Required" : "● Unread"}
                            </span>
                          )}
                        </div>
                      </div>
                    ))
                  }
                </div>
                <div className="mail-dd-footer">
                  <button className="mail-dd-open-btn" onClick={() => { setDdOpen(false); setTab("govmail"); }}>
                    Open Gov Mail
                  </button>
                </div>
              </div>
            )}
          </span>

        </div>
      </div>

      {/* ── Side nav ─────────────────────────────────────────────── */}
      <nav className="pres-nav">
        <div className="pres-nav-section">{t("Tabs")}</div>
        {TABS.map(tb => (
          <button key={tb.id}
            className={`pres-nav-item ${tab === tb.id ? "is-active" : ""}`}
            onClick={() => setTab(tb.id)}>
            <Icon name={tb.icon} size={18} />
            {t(tb.label)}
          </button>
        ))}

        <div className="pres-nav-section">{t("Period")}</div>
        <button className="pres-nav-item is-active"><Icon name="today" size={18} />{t("Today")}, {todayLabel}</button>
        <button className="pres-nav-item"><Icon name="calendar_month" size={18} />{t("This month")}</button>

        <div className="pres-nav-section">{t("Intelligence")}</div>
        <button className={`pres-nav-item ${tab === "news" ? "is-active" : ""}`}
                onClick={() => setTab("news")}>
          <Icon name="newspaper" size={18} />{t("News")}
          <span style={{ marginLeft: "auto", fontSize: 10, background: "var(--pres-accent)", color: "#fff", borderRadius: 8, padding: "1px 6px", fontWeight: 700 }}>10</span>
        </button>

        <div className="pres-nav-section">{t("Government Mail")}</div>
        <button className={`pres-nav-item ${tab === "govmail" ? "is-active" : ""}`}
                onClick={() => setTab("govmail")}>
          <Icon name="mail" size={18} />{t("Gov Mail")}
          {unreadCount > 0 && (
            <span style={{ marginLeft: "auto", fontSize: 10, background: "var(--pres-bad)", color: "#fff", borderRadius: 8, padding: "1px 6px", fontWeight: 700 }}>{unreadCount}</span>
          )}
        </button>

        <div className="pres-nav-foot">
          <div style={{ fontWeight: 600, color: "var(--pres-text-dim)" }}>President of Uganda</div>
          <div>{t("Office of the President")}</div>
          <div className="mute2" style={{ marginTop: 4 }}>v0.1 · {data.asOf.split("·")[0]}</div>
        </div>
      </nav>

      {/* ── Main content ─────────────────────────────────────────── */}
      <main className="pres-main">{tabBody[tab]}</main>

      {/* ── Alerts column ────────────────────────────────────────── */}
      <aside className="pres-alerts">
        <div className="alerts-h">
          <span>{t("Alerts")} · {t("Live")}</span>
          <span className="count">{data.alerts.length}</span>
        </div>
        {data.alerts.map((a, i) => (
          <div key={i} className={`alert ${a.sev}`}>
            <div className="a-h">
              <span className="row" style={{ gap: 6 }}>
                <SeverityIcon sev={a.sev} />{a.sev}
              </span>
              <span className="a-t">{a.t}</span>
            </div>
            <div className="a-body">
              <strong style={{ fontWeight: 700 }}>{a.title}</strong> — {a.body}
            </div>
            <div className="a-meta">{a.meta}</div>
          </div>
        ))}
      </aside>

      {/* ── Tweaks panel ─────────────────────────────────────────── */}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Display">
          <TweakRadio
            label={t("Density")}
            value={tweaks.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { value: "compact",     label: t("Compact") },
              { value: "comfortable", label: t("Comfortable") },
            ]} />
          <TweakRadio
            label={t("Language")}
            value={tweaks.language}
            onChange={(v) => setTweak("language", v)}
            options={[
              { value: "en", label: t("English") },
              { value: "lg", label: t("Luganda") },
            ]} />
        </TweakSection>
      </TweaksPanel>
    </div>
    </window.LangCtx.Provider>
    </window.NavCtx.Provider>
    </window.MailCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
